<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Local agent</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .mensaje { max-width: 80%; padding: 10px 15px; border-radius: 15px; line-height: 1.4; }
        .yo { background-color: #0b93f6; align-self: flex-end; }
        .agente { background-color: #2a2a2a; align-self: flex-start; border: 1px solid #444; }
        #input-area { display: flex; padding: 10px; background-color: #1e1e1e; border-top: 1px solid #333; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: none; outline: none; background: #333; color: white; margin-right: 10px; }
        button { background-color: #0b93f6; color: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="chat">
        <div class="mensaje agente"> Hello! I am your local agent using Qwen 2.5. How can I help?</div>
    </div>
    <div id="input-area">
        <input type="text" id="mensaje-input" placeholder="Escribe tu mensaje...">
        <button onclick="Sendamessage()">send</button>
    </div>
    <script>
        async function enviarMensaje() {
            const input = document.getElementById('mensaje-input');
            const texto = input.value.trim();
            if (!texto) return;
            const chat = document.getElementById('chat');
            chat.innerHTML += `<div class="mensaje yo">${texto}</div>`;
            input.value = '';
            const idCarga = 'carga-' + Date.now();
            chat.innerHTML += `<div id="${idCarga}" class="mensaje agente"><i>Procesando con Snapdragon...</i></div>`;
            chat.scrollTop = chat.scrollHeight;
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ texto: texto })
                });
                const data = await response.json();
                document.getElementById(idCarga).outerHTML = `<div class="mensaje agente">${data.respuesta}</div>`;
            } catch (error) {
                document.getElementById(idCarga).outerHTML = `<div class="mensaje agente" style="color: red;">Error en el backend.</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
